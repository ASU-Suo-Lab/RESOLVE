DATASET: "sunlakes"

# dataset info
SPLIT: "val"                 # train/val
TRACKING_MODE: "ONLINE"      # ONLINE / GLOBAL
IS_RV_MATCHING: False
FRAME_RATE: 10               # ✅ 10Hz
CATEGORY_LIST: [
  "barrier", "bicycle", "bus", "car", "construction_vehicle",
  "motorcycle", "pedestrian", "traffic_cone", "trailer", "truck"
]

CATEGORY_MAP_TO_NUMBER:
  "barrier": 0
  "bicycle": 1
  "bus": 2
  "car": 3
  "construction_vehicle": 4
  "motorcycle": 5
  "pedestrian": 6
  "traffic_cone": 7
  "trailer": 8
  "truck": 9

MATCHING:
  BEV:
    COST_STATE:
      0: "BackPredict"
      1: "BackPredict"
      2: "Predict"
      3: "Fusion"
      4: "Predict"
      5: "BackPredict"
      6: "BackPredict"
      7: "BackPredict"
      8: "BackPredict"
      9: "BackPredict"
    COST_MODE:
      0: "RO_GDIOU_3D"
      1: "RO_GDIOU_3D"
      2: "RO_GDIOU_3D"
      3: "RO_GDIOU_3D"
      4: "RO_GDIOU_3D"
      5: "RO_GDIOU_3D"
      6: "RO_GDIOU_3D"
      7: "RO_GDIOU_3D"
      8: "RO_GDIOU_3D"
      9: "RO_GDIOU_3D"
