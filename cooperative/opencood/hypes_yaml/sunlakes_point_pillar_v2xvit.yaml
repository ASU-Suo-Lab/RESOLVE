name: sunlakes_point_pillar_v2xvit
root_dir: '/home/suolab/OpenCOOD/data/sunlakes_opencood_ego_rs16b_rs16/train'
validate_dir: '/home/suolab/OpenCOOD/data/sunlakes_opencood_ego_rs16b_rs16/validate'

wild_setting:
  async: false
  async_mode: 'sim'
  async_overhead: 100
  seed: 25
  loc_err: false
  xyz_std: 0.2
  ryp_std: 0.2
  data_size: 1.06 # Mb!!
  transmission_speed: 27 # Mbps!!
  backbone_delay: 10 # ms

yaml_parser: "load_point_pillar_params"
train_params:
  batch_size: &batch_size 4
  epoches: 20
  eval_freq: 5
  save_freq: 1
  max_cav: &max_cav 2

fusion:
  core_method: 'IntermediateFusionDataset' # LateFusionDataset, EarlyFusionDataset, IntermediateFusionDataset supported
  args:
    cur_ego_pose_flag: False
      # when the cur_ego_pose_flag is set to True, there is no time gap
      # between  the time when the LiDAR data is captured by connected
      # agents and when the extracted features are received by
      # the ego vehicle, which is equal to implement STCM. When set to False,
      # STCM has to be used.

# preprocess-related
preprocess:
  # options: BasePreprocessor, VoxelPreprocessor, BevPreprocessor
  core_method: 'SpVoxelPreprocessor'
  args:
    voxel_size: &voxel_size [0.3, 0.3, 8.0]
    max_points_per_voxel: 32
    max_voxel_train: 32000
    max_voxel_test: 70000
  # lidar range for each individual cav.
  cav_lidar_range: &cav_lidar [-60.0, -60.0, -8.0, 93.6, 93.6, 0.0]



# anchor box related
postprocess:
  core_method: 'VoxelPostprocessor' # VoxelPostprocessor, BevPostprocessor supported
  anchor_args:
    cav_lidar_range: *cav_lidar
    feature_stride: 4
    class_names: ['car', 'truck', 'construction_vehicle', 'bus', 'trailer', 'barrier', 'motorcycle', 'bicycle', 'pedestrian', 'traffic_cone']
    generator_configs:
      - class_name: car
        h: 1.63
        w: 1.96
        l: 4.50
        z: -4.275
        anchor_rotations: [0, 90]
        matched_threshold: 0.6
        unmatched_threshold: 0.45
      - class_name: truck
        h: 1.94
        w: 2.17
        l: 5.72
        z: -4.250
        anchor_rotations: [0, 90]
        matched_threshold: 0.55
        unmatched_threshold: 0.4
      - class_name: construction_vehicle
        h: 3.84
        w: 2.78
        l: 11.78
        z: -3.400
        anchor_rotations: [0, 90]
        matched_threshold: 0.5
        unmatched_threshold: 0.35
      - class_name: bus
        h: 3.15
        w: 2.84
        l: 11.93
        z: -3.825
        anchor_rotations: [0, 90]
        matched_threshold: 0.55
        unmatched_threshold: 0.4
      - class_name: trailer
        h: 3.04
        w: 2.75
        l: 10.00
        z: -3.380
        anchor_rotations: [0, 90]
        matched_threshold: 0.5
        unmatched_threshold: 0.35
      - class_name: barrier
        h: 2.49
        w: 2.17
        l: 5.82
        z: -3.625
        anchor_rotations: [0, 90]
        matched_threshold: 0.55
        unmatched_threshold: 0.4
      - class_name: motorcycle
        h: 1.55
        w: 0.96
        l: 2.38
        z: -4.565
        anchor_rotations: [0, 90]
        matched_threshold: 0.5
        unmatched_threshold: 0.3
      - class_name: bicycle
        h: 1.75
        w: 0.85
        l: 1.80
        z: -4.375
        anchor_rotations: [0, 90]
        matched_threshold: 0.5
        unmatched_threshold: 0.35
      - class_name: pedestrian
        h: 1.68
        w: 0.78
        l: 0.80
        z: -4.280
        anchor_rotations: [0, 90]
        matched_threshold: 0.6
        unmatched_threshold: 0.4
      - class_name: traffic_cone
        h: 1.80
        w: 1.28
        l: 2.47
        z: -4.270
        anchor_rotations: [0, 90]
        matched_threshold: 0.6
        unmatched_threshold: 0.4
    num: &achor_num 20
  target_args:
    score_threshold: 0.20
  order: 'hwl' # hwl or lwh
  max_num: 100 # maximum number of objects in a single frame. use this number to make sure different frames has the same dimension in the same batch
  nms_thresh: 0.15

# model related
model:
  core_method: point_pillar_transformer
  args:
    voxel_size: *voxel_size
    lidar_range: *cav_lidar
    anchor_number: *achor_num
    anchor_num: *achor_num
    max_cav: *max_cav
    compression: 0 # compression rate
    backbone_fix: false

    pillar_vfe:
      use_norm: true
      with_distance: false
      use_absolute_xyz: true
      num_filters: [64]
    point_pillar_scatter:
      num_features: 64

    base_bev_backbone:
      layer_nums: [3, 5, 8]
      layer_strides: [2, 2, 2]
      num_filters: [64, 128, 256]
      upsample_strides: [1, 2, 4]
      num_upsample_filter: [128, 128, 128]
    shrink_header:
      kernal_size: [3]
      stride: [2]
      padding: [1]
      dim: [256]
      input_dim: 384 # 128 * 3

    transformer:
      encoder: &encoder
        # number of fusion blocks per encoder layer
        num_blocks: 1
        # number of encoder layers
        depth: 3
        use_roi_mask: true
        use_RTE: &use_RTE true
        RTE_ratio: &RTE_ratio 2 # 2 means the dt has 100ms interval while 1 means 50 ms interval
        # agent-wise attention
        cav_att_config: &cav_att_config
          dim: 256
          use_hetero: false
          use_RTE: *use_RTE
          RTE_ratio: *RTE_ratio
          heads: 8
          dim_head: 32
          dropout: 0.3
        # spatial-wise attention
        pwindow_att_config: &pwindow_att_config
          dim: 256
          heads: [16, 8, 4]
          dim_head: [16, 32, 64]
          dropout: 0.3
          window_size: [4, 8, 16]
          relative_pos_embedding: true
          fusion_method: 'split_attn'
        # feedforward condition
        feed_forward: &feed_forward
          mlp_dim: 256
          dropout: 0.3
        sttf: &sttf
          voxel_size: *voxel_size
          downsample_rate: 4

      # add decoder later

loss:
  core_method: point_pillar_loss
  args:
    cls_weight: 1.0
    reg: 2.0

optimizer:
  core_method: Adam
  lr: 0.001
  args:
    eps: 1e-10
    weight_decay: 1e-4

lr_scheduler:
  core_method: multistep #step, multistep and Exponential support
  gamma: 0.1
  step_size: [20, 28]
